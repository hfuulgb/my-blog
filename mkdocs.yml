site_name: my blog

theme:
  name: material
  language: zh  # 建议加上这行，让搜索提示等显示中文
  palette: 
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

plugins:
  - search:
      lang: 
        - en
        - zh # 建议同时开启中英文搜索
      separator: '[\s\-\.]+'
  - blog:
      post_url_format: posts/{date}-{slug}/
      categories_allowed:
        - 技术
        - 生活
        - 学习

nav:
  - 🏠 首页: index.md
  - 💻 技术笔记:
      - 在 Mac 上配置 Python: tech/python-mac.md
      - MkDocs 部署指南: tech/mkdocs-tips.md
  - 📚 学业/课程:
      - 心理学视频项目: academic/psychology.md
      - 英语学习记录: academic/cet4-vocab.md
  - 🏸 兴趣爱好:
      - 羽毛球进阶: life/badminton.md
  - 👤 关于我: about.md